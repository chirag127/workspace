name = "oriz-flags-worker"
main = "src/index.ts"
compatibility_date = "2026-06-01"
routes = [{ pattern = "flags.oriz.in/*", custom_domain = true }]

[[d1_databases]]
binding = "DB"
database_name = "oriz-flags"
# Set database_id via `wrangler d1 create oriz-flags` then paste the id here.
database_id = "TODO_SET_AFTER_CREATE"

[[kv_namespaces]]
binding = "FLAGS"
# Set id via `wrangler kv:namespace create FLAGS` then paste the id here.
id = "TODO_SET_AFTER_CREATE"

[triggers]
crons = ["30 2 * * *"]  # 02:30 UTC = 08:00 IST daily DR snapshot
