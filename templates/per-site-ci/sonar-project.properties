# SonarCloud config for chirag127/oriz-<sitename>.
# Replace <sitename> below before committing into the submodule.

sonar.projectKey=chirag127_oriz-<sitename>
sonar.organization=chirag127
sonar.projectName=oriz-<sitename>

# Source layout
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions: build output, deps, generated, lockfiles
sonar.exclusions=\
  **/dist/**,\
  **/build/**,\
  **/.output/**,\
  **/out/**,\
  **/node_modules/**,\
  **/coverage/**,\
  **/.next/**,\
  **/.astro/**,\
  **/*.min.js,\
  **/pnpm-lock.yaml,\
  **/package-lock.json

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.config.{js,ts,mjs,cjs},\
  **/*.d.ts

# JS/TS settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Quality gate
sonar.qualitygate.wait=true
