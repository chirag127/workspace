name: Publish knowledge to knowledge.oriz.in

on:
  push:
    branches: [main]
    paths:
      - 'knowledge/**'
      - '.github/workflows/publish-knowledge.yml'
      - 'scripts/build-knowledge-site.mjs'
  workflow_dispatch: {}

concurrency:
  group: publish-knowledge
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: OKF conformance — witscode validator
        run: |
          npx --yes @witscode/okf-validator ./knowledge || (
            echo "::error::OKF validator failed — bad frontmatter blocked from public deploy"
            exit 1
          )
        continue-on-error: true # remove after witscode confirmed stable

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build knowledge site
        run: node scripts/build-knowledge-site.mjs
        env:
          SITE_URL: https://knowledge.oriz.in
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: knowledge-oriz-in
          directory: dist/knowledge
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
