# Hourly sync of oriz-org forks from their upstreams.
#
# Per knowledge/rules/agent/fork-thin-upstream-tracking.md:
# - oriz-org/freellmapi  main MUST equal tashfeenahmed/freellmapi  main exactly
# - oriz-org/omniroute   main MUST equal diegosouzapw/OmniRoute    main exactly
# - All oriz work happens via PRs FROM chirag127 personal forks (not from oriz-org)
# - Forks stay 100% upstream-clean. No oriz files on fork main, ever.
#
# This workflow runs hourly from the UMBRELLA repo so the forks themselves
# carry zero oriz files. Each fork gets force-pushed to match upstream.

name: oriz-sync-forks

on:
  schedule:
    - cron: '17 * * * *'  # hourly at :17 to dodge GHA queue peaks
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # one fork failing doesn't block the others
      matrix:
        fork:
          - { name: freellmapi, upstream: 'tashfeenahmed/freellmapi', branch: main }
          - { name: omniroute,  upstream: 'diegosouzapw/OmniRoute',   branch: main }
    steps:
      - name: Sync ${{ matrix.fork.name }} from ${{ matrix.fork.upstream }}
        env:
          # SYNC_TOKEN must be a PAT (classic, repo scope) stored in
          # oriz-org/workspace > Settings > Secrets and variables > Actions.
          # The default GITHUB_TOKEN cannot push to OTHER repos.
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          FORK: ${{ matrix.fork.name }}
          UPSTREAM: ${{ matrix.fork.upstream }}
          BRANCH: ${{ matrix.fork.branch }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::SYNC_TOKEN secret not set. Create a PAT with repo scope and add it."
            exit 1
          fi

          # Clone upstream shallowly + add fork as second remote.
          git clone --depth=50 "https://github.com/${UPSTREAM}.git" work
          cd work
          git remote add fork "https://x-access-token:${GH_TOKEN}@github.com/oriz-org/${FORK}.git"
          git fetch fork "${BRANCH}" || true

          # Hard-reset fork to match upstream exactly.
          UPSTREAM_SHA=$(git rev-parse HEAD)
          FORK_SHA=$(git rev-parse "fork/${BRANCH}" 2>/dev/null || echo "none")
          if [ "${UPSTREAM_SHA}" = "${FORK_SHA}" ]; then
            echo "${FORK}: already in sync (sha=${UPSTREAM_SHA::7})"
            exit 0
          fi

          echo "${FORK}: upstream=${UPSTREAM_SHA::7}, fork=${FORK_SHA::7} — force-pushing"
          git push --force fork "HEAD:${BRANCH}"
          echo "::notice::${FORK} synced to ${UPSTREAM_SHA::7}"
