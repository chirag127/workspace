name: Mirror to 6 git hosts
# Master cron — every Friday 03:30 IST (Thursday 22:00 UTC).
# Pushes ALL repos from oriz-org + chirag127 to 6 mirror hosts.
# Hosts: GitLab.com, Codeberg.org, Bitbucket Cloud, GitFlic.ru, Azure DevOps, AWS CodeCommit.
# Insurance against GitHub becoming unusable.
# See knowledge/decisions/architecture/mirror-to-6-git-hosts.md
# Setup runbook: knowledge/runbooks/mirror-all-hosts-setup.md

on:
  schedule:
    - cron: '0 22 * * 4'   # Thursday 22:00 UTC = Friday 03:30 IST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Step 1: Discover all repos (oriz-org + chirag127 personal) ─────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.collect.outputs.repos }}
    steps:
      - name: Collect repos from oriz-org and chirag127
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          # Org repos
          ORG_REPOS=$(gh repo list oriz-org --limit 500 --json nameWithOwner,name,isPrivate \
            -q '[.[] | select(.isPrivate == false) | {full: .nameWithOwner, name: .name}]')

          # Personal repos (chirag127 — only those owned by chirag127, not forks or collaborator)
          # ALSO filter out private repos — they're personal/sensitive and don't belong on public mirrors.
          PERSONAL_REPOS=$(gh repo list chirag127 --limit 500 --json nameWithOwner,name,isPrivate \
            -q '[.[] | select(.isPrivate == false) | {full: .nameWithOwner, name: .name}]')

          # Explicit exclusion list — defense in depth.
          # Anything matching these names is dropped even if it appears public.
          # See knowledge/decisions/policy/private-repos-excluded-from-mirror-cron.md
          EXCLUDE='["secrets", "Recovery-codes", "recovery-codes", "envpact-secrets"]'

          # Merge both arrays + apply exclusion
          ALL=$(echo "$ORG_REPOS $PERSONAL_REPOS" | jq -s --argjson excl "$EXCLUDE" \
            'add | unique_by(.name) | map(select(.name as $n | $excl | index($n) | not))')
          echo "Total repos to mirror: $(echo "$ALL" | jq 'length')"
          echo "repos=$ALL" >> $GITHUB_OUTPUT

  # ── Step 2: Mirror to each host in parallel ────────────────────────────────
  mirror:
    needs: discover
    runs-on: ubuntu-latest
    if: needs.discover.outputs.repos != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        host:
          - name: gitlab
            url_prefix: https://oauth2:TOKEN@gitlab.com
            token_var: MIRROR_GITLAB_TOKEN
            user_var: MIRROR_GITLAB_USERNAME
            token_type: gitlab
          - name: codeberg
            url_prefix: https://USER:TOKEN@codeberg.org
            token_var: MIRROR_CODEBERG_TOKEN
            user_var: MIRROR_CODEBERG_USERNAME
            token_type: forgejo
          - name: bitbucket
            url_prefix: https://USER:TOKEN@bitbucket.org
            token_var: MIRROR_BITBUCKET_API_TOKEN
            user_var: MIRROR_BITBUCKET_USERNAME
            token_type: bitbucket
          - name: gitflic
            url_prefix: https://USER:TOKEN@gitflic.ru/project
            token_var: MIRROR_GITFLIC_TOKEN
            user_var: MIRROR_GITFLIC_USERNAME
            token_type: gitflic
          - name: azure
            url_prefix: https://x:TOKEN@dev.azure.com
            token_var: MIRROR_AZURE_DEVOPS_TOKEN
            user_var: MIRROR_AZURE_DEVOPS_ORG
            token_type: azure
          - name: codecommit
            url_prefix: https://USER:TOKEN@git.codecommit.REGION.amazonaws.com/v1/repos
            token_var: MIRROR_CODECOMMIT_PASSWORD
            user_var: MIRROR_CODECOMMIT_USERNAME
            token_type: codecommit

    steps:
      - name: Mirror all repos to ${{ matrix.host.name }}
        id: mirror
        continue-on-error: true
        env:
          HOST_TOKEN: ${{ secrets[matrix.host.token_var] }}
          HOST_USER: ${{ secrets[matrix.host.user_var] }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          REPOS: ${{ needs.discover.outputs.repos }}
          HOST_NAME: ${{ matrix.host.name }}
          TOKEN_TYPE: ${{ matrix.host.token_type }}
          # Azure-specific
          ADO_ORG: ${{ secrets.MIRROR_AZURE_DEVOPS_ORG }}
          ADO_PROJECT: ${{ secrets.MIRROR_AZURE_DEVOPS_PROJECT }}
          # CodeCommit-specific
          CC_REGION: ${{ secrets.MIRROR_CODECOMMIT_REGION }}
          CC_USER: ${{ secrets.MIRROR_CODECOMMIT_USERNAME }}
          CC_PASS: ${{ secrets.MIRROR_CODECOMMIT_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.MIRROR_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MIRROR_AWS_SECRET_ACCESS_KEY }}
        run: |
          set -e
          STATUS_FILE=/tmp/mirror-${HOST_NAME}-status.txt
          : > "$STATUS_FILE"

          pip install git-remote-codecommit --quiet 2>/dev/null || true

          echo "$REPOS" | jq -r '.[].full' | while read -r FULL_NAME; do
            REPO_NAME=$(basename "$FULL_NAME")
            echo "→ ${HOST_NAME}/${REPO_NAME}"

            # Build mirror URL based on host type
            case "$TOKEN_TYPE" in
              gitlab)
                MIRROR_URL="https://oauth2:${HOST_TOKEN}@gitlab.com/${HOST_USER}/${REPO_NAME}.git"
                # Create repo (idempotent)
                curl -s -o /dev/null -X POST "https://gitlab.com/api/v4/projects" \
                  -H "PRIVATE-TOKEN: ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"visibility\":\"public\"}" || true
                ;;
              forgejo)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@codeberg.org/${HOST_USER}/${REPO_NAME}.git"
                # Create repo (idempotent)
                curl -s -o /dev/null -X POST "https://codeberg.org/api/v1/user/repos" \
                  -H "Authorization: token ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"private\":false,\"auto_init\":false}" || true
                ;;
              bitbucket)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@bitbucket.org/${HOST_USER}/${REPO_NAME}.git"
                # Create repo (idempotent)
                curl -s -o /dev/null -X POST \
                  -H "Authorization: Bearer ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"scm\":\"git\",\"is_private\":false}" \
                  "https://api.bitbucket.org/2.0/repositories/${HOST_USER}/${REPO_NAME}" || true
                ;;
              gitflic)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@gitflic.ru/project/${HOST_USER}/${REPO_NAME}.git"
                # Create repo (idempotent)
                curl -s -o /dev/null -X POST "https://api.gitflic.ru/project" \
                  -H "Authorization: token ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"title\":\"${REPO_NAME}\",\"alias\":\"${REPO_NAME}\",\"private\":false}" || true
                ;;
              azure)
                # Azure DevOps URL: https://x:PAT@dev.azure.com/org/project/_git/repo
                MIRROR_URL="https://x:${HOST_TOKEN}@dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_git/${REPO_NAME}"
                # Create repo (idempotent — get project ID first)
                if [ -z "$ADO_PROJECT_ID" ]; then
                  ADO_PROJECT_ID=$(curl -s -u ":${HOST_TOKEN}" \
                    "https://dev.azure.com/${ADO_ORG}/_apis/projects/${ADO_PROJECT}?api-version=7.1" \
                    | jq -r '.id')
                  export ADO_PROJECT_ID
                fi
                curl -s -o /dev/null -X POST -u ":${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"project\":{\"id\":\"${ADO_PROJECT_ID}\"}}" \
                  "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/git/repositories?api-version=7.1" || true
                ;;
              codecommit)
                MIRROR_URL="https://${CC_USER}:${CC_PASS}@git.codecommit.${CC_REGION}.amazonaws.com/v1/repos/${REPO_NAME}"
                # Create repo via AWS CLI (idempotent)
                aws codecommit create-repository \
                  --repository-name "${REPO_NAME}" \
                  --region "${CC_REGION}" 2>/dev/null || true
                ;;
            esac

            # Clone source from GitHub
            TMP_DIR="/tmp/mirror-${REPO_NAME}-$$"
            if git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/${FULL_NAME}.git" "$TMP_DIR" 2>&1 | tail -3; then
              cd "$TMP_DIR"
              # Push mirror
              if git push --mirror --force-with-lease "$MIRROR_URL" 2>&1 | tail -3; then
                echo "✓ $FULL_NAME" >> "$STATUS_FILE"
              else
                echo "✗ $FULL_NAME (push failed)" >> "$STATUS_FILE"
              fi
              cd "$GITHUB_WORKSPACE"
              rm -rf "$TMP_DIR"
            else
              echo "✗ $FULL_NAME (clone failed)" >> "$STATUS_FILE"
            fi

            sleep 0.5  # rate limit guard
          done

          echo ""
          echo "=== ${HOST_NAME} summary ==="
          cat "$STATUS_FILE"
          OK=$(grep -c '^✓' "$STATUS_FILE" || true)
          FAIL=$(grep -c '^✗' "$STATUS_FILE" || true)
          echo "ok=$OK fail=$FAIL"
          echo "ok=$OK" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram on host completion
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HOST: ${{ matrix.host.name }}
          OK: ${{ steps.mirror.outputs.ok }}
          FAIL: ${{ steps.mirror.outputs.fail }}
        run: |
          MSG="Mirror ${HOST}: ✓ ${OK} repos | ✗ ${FAIL} repos | $(date -u '+%Y-%m-%d')"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "disable_notification=true" || true

  # ── Step 3: Weekly digest after all hosts complete ─────────────────────────
  weekly-digest:
    needs: [discover, mirror]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Post weekly digest to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=📦 Weekly 6-host mirror complete: $(date -u '+%Y-%m-%d')%0Ahosts: GitLab ✓ Codeberg ✓ Bitbucket ✓ GitFlic ✓ AzureDevOps ✓ CodeCommit ✓" \
            -d "disable_notification=false" || true
