name: Mirror to 9 git hosts
# Master cron — every Friday 03:30 IST (Thursday 22:00 UTC).
# Pushes ALL repos/own/* submodules to 9 popular GitHub-alternative hosts.
# Hosts: GitLab, Codeberg, Bitbucket, GitFlic, Azure DevOps, NotABug,
#        GitGud, RocketGit, Radicle.
# All free, no self-hosting, no card-on-file. Backup runs from this umbrella
# repo's GitHub Actions — zero local state.
# See knowledge/decisions/architecture/ops/mirror-to-9-popular-alternatives-2026-06-28.md
# Setup runbook: knowledge/runbooks/hosting/mirror-all-hosts-setup.md

on:
  schedule:
    - cron: '0 22 * * 4'   # Thursday 22:00 UTC = Friday 03:30 IST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Step 1: Discover repos/own/* submodules from .gitmodules ───────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.collect.outputs.repos }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
      - name: Collect repos/own/* submodules from .gitmodules
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          # Parse .gitmodules — keep only entries whose path starts with repos/own/.
          # Mirror scope = own originals only. Forks (repos/frk/*) skipped —
          # upstream already mirrors them; we only patched local copies.
          REPOS=$(awk '
            /^\[submodule/ { path=""; url="" }
            /^[[:space:]]*path[[:space:]]*=/ { sub(/^[^=]*=[[:space:]]*/, ""); path=$0 }
            /^[[:space:]]*url[[:space:]]*=/  { sub(/^[^=]*=[[:space:]]*/, ""); url=$0
              if (path ~ /^repos\/own\//) {
                # Extract repo name from path (basename) and owner/name from URL
                n=split(path, p, "/"); name=p[n]
                # owner/name from URL: strip protocol, host, and trailing .git
                sub(/^https:\/\/github\.com\//, "", url); sub(/\.git$/, "", url)
                printf "{\"full\":\"%s\",\"name\":\"%s\"}\n", url, name
              }
            }
          ' .gitmodules | jq -s 'unique_by(.name)')

          # Filter out private repos — workspace policy: no private repos mirrored.
          # See knowledge/decisions/policy/private-repos-excluded-from-mirror-cron.md
          PUBLIC_REPOS='[]'
          for FULL in $(echo "$REPOS" | jq -r '.[].full'); do
            RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
                          -H "Authorization: Bearer ${GH_TOKEN}" \
                          -H "Accept: application/vnd.github+json" \
                          -H "X-GitHub-Api-Version: 2022-11-28" \
                          "https://api.github.com/repos/${FULL}")
            CODE=$(echo "$RESP" | grep -oE 'HTTP_CODE:[0-9]+' | cut -d: -f2)
            BODY=$(echo "$RESP" | sed '$d')   # drop trailing HTTP_CODE: line
            VIS=$(echo "$BODY" | jq -r '.private // "missing"' 2>/dev/null || echo "parse-error")
            if [ "$VIS" = "false" ]; then
              ENTRY=$(echo "$REPOS" | jq --arg f "$FULL" '.[] | select(.full==$f)')
              PUBLIC_REPOS=$(echo "$PUBLIC_REPOS" | jq --argjson e "$ENTRY" '. + [$e]')
              echo "  ✓ public: ${FULL} (HTTP $CODE)"
            else
              echo "::notice::Skipping ${FULL} (HTTP=$CODE private=$VIS msg=$(echo "$BODY" | jq -r '.message // empty' 2>/dev/null | head -c 80))"
            fi
          done

          echo "Total public repos/own/* to mirror: $(echo "$PUBLIC_REPOS" | jq 'length')"
          echo "repos=$(echo "$PUBLIC_REPOS" | jq -c)" >> $GITHUB_OUTPUT

  # ── Step 2: Mirror to each host in parallel ────────────────────────────────
  mirror:
    needs: discover
    runs-on: ubuntu-latest
    if: needs.discover.outputs.repos != '[]'
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        host:
          - name: gitlab
            url_prefix: https://oauth2:TOKEN@gitlab.com
            token_var: MIRROR_GITLAB_TOKEN
            user_var: MIRROR_GITLAB_USERNAME
            token_type: gitlab
          - name: codeberg
            url_prefix: https://USER:TOKEN@codeberg.org
            token_var: MIRROR_CODEBERG_TOKEN
            user_var: MIRROR_CODEBERG_USERNAME
            token_type: forgejo
          - name: bitbucket
            url_prefix: https://USER:TOKEN@bitbucket.org
            token_var: MIRROR_BITBUCKET_API_TOKEN
            user_var: MIRROR_BITBUCKET_USERNAME
            token_type: bitbucket
          - name: gitflic
            url_prefix: https://USER:TOKEN@gitflic.ru/project
            token_var: MIRROR_GITFLIC_TOKEN
            user_var: MIRROR_GITFLIC_USERNAME
            token_type: gitflic
          - name: azure
            url_prefix: https://x:TOKEN@dev.azure.com
            token_var: MIRROR_AZURE_DEVOPS_TOKEN
            user_var: MIRROR_AZURE_DEVOPS_ORG
            token_type: azure
          - name: notabug
            url_prefix: https://USER:TOKEN@notabug.org
            token_var: MIRROR_NOTABUG_TOKEN
            user_var: MIRROR_NOTABUG_USERNAME
            token_type: gogs
          - name: gitgud
            url_prefix: https://oauth2:TOKEN@gitgud.io
            token_var: MIRROR_GITGUD_TOKEN
            user_var: MIRROR_GITGUD_USERNAME
            token_type: gitlab_gitgud
          - name: rocketgit
            url_prefix: https://USER:TOKEN@rocketgit.com
            token_var: MIRROR_ROCKETGIT_TOKEN
            user_var: MIRROR_ROCKETGIT_USERNAME
            token_type: rocketgit

    steps:
      - name: Skip if host disabled
        id: gate
        env:
          HOST: ${{ matrix.host.name }}
          ENABLE_GITLAB: ${{ vars.ENABLE_MIRROR_GITLAB }}
          ENABLE_CODEBERG: ${{ vars.ENABLE_MIRROR_CODEBERG }}
          ENABLE_BITBUCKET: ${{ vars.ENABLE_MIRROR_BITBUCKET }}
          ENABLE_GITFLIC: ${{ vars.ENABLE_MIRROR_GITFLIC }}
          ENABLE_AZURE: ${{ vars.ENABLE_MIRROR_AZURE_DEVOPS }}
          ENABLE_NOTABUG: ${{ vars.ENABLE_MIRROR_NOTABUG }}
          ENABLE_GITGUD: ${{ vars.ENABLE_MIRROR_GITGUD }}
          ENABLE_ROCKETGIT: ${{ vars.ENABLE_MIRROR_ROCKETGIT }}
        run: |
          # Default ON for hosts known healthy 2026-06-28 (gitlab, azure, notabug,
          # gitgud, rocketgit);
          # default OFF for hosts currently down/broken (codeberg, bitbucket, gitflic).
          # Override via repo/org Variables: ENABLE_MIRROR_<HOST>=0|1.
          case "$HOST" in
            gitlab)    FLAG="${ENABLE_GITLAB:-1}" ;;
            codeberg)  FLAG="${ENABLE_CODEBERG:-0}" ;;
            bitbucket) FLAG="${ENABLE_BITBUCKET:-0}" ;;
            gitflic)   FLAG="${ENABLE_GITFLIC:-0}" ;;
            azure)     FLAG="${ENABLE_AZURE:-1}" ;;
            notabug)   FLAG="${ENABLE_NOTABUG:-1}" ;;
            gitgud)    FLAG="${ENABLE_GITGUD:-1}" ;;
            rocketgit) FLAG="${ENABLE_ROCKETGIT:-1}" ;;
            *)         FLAG="0" ;;
          esac
          echo "enabled=$FLAG" >> "$GITHUB_OUTPUT"
          if [ "$FLAG" != "1" ]; then
            echo "::notice::Mirror $HOST disabled (ENABLE_MIRROR_${HOST^^}=$FLAG). Skipping."
          fi

      - name: Mirror all repos to ${{ matrix.host.name }}
        if: steps.gate.outputs.enabled == '1'
        id: mirror
        continue-on-error: true
        env:
          HOST_TOKEN: ${{ secrets[matrix.host.token_var] }}
          HOST_USER: ${{ secrets[matrix.host.user_var] }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          REPOS: ${{ needs.discover.outputs.repos }}
          HOST_NAME: ${{ matrix.host.name }}
          TOKEN_TYPE: ${{ matrix.host.token_type }}
          # Azure-specific
          ADO_ORG: ${{ secrets.MIRROR_AZURE_DEVOPS_ORG }}
          ADO_PROJECT: ${{ secrets.MIRROR_AZURE_DEVOPS_PROJECT }}
        run: |
          set -e
          STATUS_FILE=/tmp/mirror-${HOST_NAME}-status.txt
          : > "$STATUS_FILE"

          echo "$REPOS" | jq -r '.[].full' | while read -r FULL_NAME; do
            REPO_NAME=$(basename "$FULL_NAME")
            echo "→ ${HOST_NAME}/${REPO_NAME}"

            # Build mirror URL based on host type
            case "$TOKEN_TYPE" in
              gitlab)
                MIRROR_URL="https://oauth2:${HOST_TOKEN}@gitlab.com/${HOST_USER}/${REPO_NAME}.git"
                curl -s -o /dev/null -X POST "https://gitlab.com/api/v4/projects" \
                  -H "PRIVATE-TOKEN: ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"visibility\":\"public\"}" || true
                ;;
              forgejo)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@codeberg.org/${HOST_USER}/${REPO_NAME}.git"
                curl -s -o /dev/null -X POST "https://codeberg.org/api/v1/user/repos" \
                  -H "Authorization: token ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"private\":false,\"auto_init\":false}" || true
                ;;
              bitbucket)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@bitbucket.org/${HOST_USER}/${REPO_NAME}.git"
                curl -s -o /dev/null -X POST \
                  -H "Authorization: Bearer ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"scm\":\"git\",\"is_private\":false}" \
                  "https://api.bitbucket.org/2.0/repositories/${HOST_USER}/${REPO_NAME}" || true
                ;;
              gitflic)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@gitflic.ru/project/${HOST_USER}/${REPO_NAME}.git"
                curl -s -o /dev/null -X POST "https://api.gitflic.ru/project" \
                  -H "Authorization: token ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"title\":\"${REPO_NAME}\",\"alias\":\"${REPO_NAME}\",\"private\":false}" || true
                ;;
              azure)
                MIRROR_URL="https://x:${HOST_TOKEN}@dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_git/${REPO_NAME}"
                if [ -z "$ADO_PROJECT_ID" ]; then
                  ADO_PROJECT_ID=$(curl -s -u ":${HOST_TOKEN}" \
                    "https://dev.azure.com/${ADO_ORG}/_apis/projects/${ADO_PROJECT}?api-version=7.1" \
                    | jq -r '.id')
                  export ADO_PROJECT_ID
                fi
                curl -s -o /dev/null -X POST -u ":${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"project\":{\"id\":\"${ADO_PROJECT_ID}\"}}" \
                  "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/git/repositories?api-version=7.1" || true
                ;;
              gogs)
                # NotABug (Gogs API)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@notabug.org/${HOST_USER}/${REPO_NAME}.git"
                curl -s -o /dev/null -X POST "https://notabug.org/api/v1/user/repos" \
                  -H "Authorization: token ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"private\":false,\"auto_init\":false}" || true
                ;;
              gitlab_gitgud)
                # GitGud.io (GitLab API)
                MIRROR_URL="https://oauth2:${HOST_TOKEN}@gitgud.io/${HOST_USER}/${REPO_NAME}.git"
                curl -s -o /dev/null -X POST "https://gitgud.io/api/v4/projects" \
                  -H "PRIVATE-TOKEN: ${HOST_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${REPO_NAME}\",\"visibility\":\"public\"}" || true
                ;;
              rocketgit)
                # RocketGit (custom API; HTTPS auth via API token)
                MIRROR_URL="https://${HOST_USER}:${HOST_TOKEN}@rocketgit.com/user/${HOST_USER}/${REPO_NAME}"
                # No public REST repo-create API; relies on pre-creation in Step 3
                # of the setup runbook. Push will fail until repo exists.
                ;;
            esac

            TMP_DIR="/tmp/mirror-${REPO_NAME}-$$"
            if git clone --mirror "https://x-access-token:${GH_TOKEN}@github.com/${FULL_NAME}.git" "$TMP_DIR" 2>&1 | tail -3; then
              cd "$TMP_DIR"
              if git push --mirror --force-with-lease "$MIRROR_URL" 2>&1 | tail -3; then
                echo "✓ $FULL_NAME" >> "$STATUS_FILE"
              else
                echo "✗ $FULL_NAME (push failed)" >> "$STATUS_FILE"
              fi
              cd "$GITHUB_WORKSPACE"
              rm -rf "$TMP_DIR"
            else
              echo "✗ $FULL_NAME (clone failed)" >> "$STATUS_FILE"
            fi

            sleep 0.5  # rate limit guard
          done

          echo ""
          echo "=== ${HOST_NAME} summary ==="
          cat "$STATUS_FILE"
          OK=$(grep -c '^✓' "$STATUS_FILE" || true)
          FAIL=$(grep -c '^✗' "$STATUS_FILE" || true)
          echo "ok=$OK fail=$FAIL"
          echo "ok=$OK" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram on host completion
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "889470354"
          HOST: ${{ matrix.host.name }}
          OK: ${{ steps.mirror.outputs.ok }}
          FAIL: ${{ steps.mirror.outputs.fail }}
        run: |
          MSG="Mirror ${HOST}: ✓ ${OK} repos | ✗ ${FAIL} repos | $(date -u '+%Y-%m-%d')"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "disable_notification=true" || true

  # ── Step 2b: Mirror to Radicle (P2P seed network, separate job) ────────────
  mirror-radicle:
    needs: discover
    runs-on: ubuntu-latest
    if: needs.discover.outputs.repos != '[]' && (vars.ENABLE_MIRROR_RADICLE == '1' || vars.ENABLE_MIRROR_RADICLE == '')
    continue-on-error: true
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
      - name: Install Radicle CLI
        run: |
          # Force text/plain accept header so the radicle.xyz endpoint serves
          # the install script (not the HTML landing page that a default
          # curl User-Agent + Accept: */* gets served on github-runner IPs).
          curl -sSfL -H "Accept: text/plain" -H "User-Agent: curl/8" https://radicle.xyz/install -o /tmp/rad-install.sh
          head -1 /tmp/rad-install.sh   # sanity-check it's a shell script
          sh /tmp/rad-install.sh
          echo "$HOME/.radicle/bin" >> $GITHUB_PATH
          export PATH="$HOME/.radicle/bin:$PATH"
          rad --version
      - name: Restore Radicle identity from secret
        env:
          RAD_KEYPAIR_TAR_B64: ${{ secrets.MIRROR_RADICLE_KEYPAIR_TAR_B64 }}
          RAD_PASSPHRASE: ${{ secrets.MIRROR_RADICLE_PASSPHRASE }}
        run: |
          # MIRROR_RADICLE_KEYPAIR_TAR_B64 = base64(tar of ~/.radicle/keys)
          # generated locally once via: tar czf - -C ~/.radicle keys | base64 -w0
          mkdir -p ~/.radicle
          echo "$RAD_KEYPAIR_TAR_B64" | base64 -d | tar xzf - -C ~/.radicle
          # Preferred seed (radicle.garden — free public seed node)
          rad config set node.preferredSeeds '["radicle.garden"]' || true
      - name: Mirror each repo to Radicle
        env:
          REPOS: ${{ needs.discover.outputs.repos }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
          RAD_PASSPHRASE: ${{ secrets.MIRROR_RADICLE_PASSPHRASE }}
        run: |
          set +e
          STATUS_FILE=/tmp/mirror-radicle-status.txt
          : > "$STATUS_FILE"
          echo "$REPOS" | jq -r '.[].full' | while read -r FULL_NAME; do
            REPO_NAME=$(basename "$FULL_NAME")
            TMP_DIR="/tmp/rad-${REPO_NAME}-$$"
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${FULL_NAME}.git" "$TMP_DIR" || {
              echo "✗ $FULL_NAME (clone failed)" >> "$STATUS_FILE"; continue;
            }
            cd "$TMP_DIR"
            # rad init creates a Radicle repo; idempotent for re-runs after first init
            RAD_PASSPHRASE="$RAD_PASSPHRASE" rad init \
              --name "$REPO_NAME" --description "Mirror of github.com/${FULL_NAME}" \
              --public --default-branch main --no-confirm 2>/dev/null || true
            RAD_PASSPHRASE="$RAD_PASSPHRASE" rad sync --announce && \
              echo "✓ $FULL_NAME" >> "$STATUS_FILE" || \
              echo "✗ $FULL_NAME (sync failed)" >> "$STATUS_FILE"
            cd "$GITHUB_WORKSPACE"
            rm -rf "$TMP_DIR"
            sleep 0.5
          done
          echo "=== radicle summary ==="
          cat "$STATUS_FILE"
          OK=$(grep -c '^✓' "$STATUS_FILE" || true)
          FAIL=$(grep -c '^✗' "$STATUS_FILE" || true)
          echo "ok=$OK fail=$FAIL"
      - name: Notify Telegram on Radicle completion
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "889470354"
        run: |
          OK=$(grep -c '^✓' /tmp/mirror-radicle-status.txt || echo 0)
          FAIL=$(grep -c '^✗' /tmp/mirror-radicle-status.txt || echo 0)
          MSG="Mirror radicle: ✓ ${OK} repos | ✗ ${FAIL} repos | $(date -u '+%Y-%m-%d')"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" -d "text=${MSG}" -d "disable_notification=true" || true

  # ── Step 3: Weekly digest after all hosts complete ─────────────────────────
  weekly-digest:
    needs: [discover, mirror, mirror-radicle]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Post weekly digest to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "889470354"
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=📦 Weekly 9-host mirror complete: $(date -u '+%Y-%m-%d')%0Ahosts: GitLab ✓ Codeberg ✓ Bitbucket ✓ GitFlic ✓ AzureDevOps ✓ NotABug ✓ GitGud ✓ RocketGit ✓ Radicle ✓" \
            -d "disable_notification=false" || true
