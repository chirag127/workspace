# Umbrella deploy workflow — triggered by repository_dispatch from submodules.
#
# Per knowledge/decisions/architecture/agent-tooling/workspace-owns-secrets-2026-07-02.md:
# - Downstream repos run their own CI (no secrets).
# - When CI green on main, downstream dispatches to this workflow.
# - This workflow owns all deploy secrets (CF, npm, Resend).
# - It checks out the umbrella + submodules, then deploys the submodule that triggered.
#
# Downstream repos dispatch via:
#   gh api repos/chirag127/workspace/dispatches \
#     -f event_type=deploy \
#     -f "client_payload[repo]=$GITHUB_REPOSITORY" \
#     -f "client_payload[sha]=$GITHUB_SHA" \
#     -f "client_payload[class]=astro-site"
#
# WORKSPACE_DISPATCH_PAT (in each downstream repo) is a PAT with repo scope on this umbrella only.

name: deploy

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Full repo name (chirag127/<slug>) to deploy'
        required: true
      class:
        description: 'Repo class'
        required: true
        type: choice
        options: [astro-site, astro-api, astro-pwa, mdbook, browser-ext, vsc-ext]
  repository_dispatch:
    types: [deploy]

concurrency:
  group: deploy-${{ github.event.client_payload.repo || github.event.inputs.repo }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    env:
      REPO: ${{ github.event.client_payload.repo || github.event.inputs.repo }}
      CLASS: ${{ github.event.client_payload.class || github.event.inputs.class }}
    steps:
      - name: Checkout umbrella (submodules included)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Resolve submodule path
        id: resolve
        run: |
          # REPO looks like chirag127/blog — find its submodule path in .gitmodules
          slug="${REPO##*/}"
          path=$(git config --file .gitmodules --get-regexp path | awk -v s="$slug" '$2 ~ ("/"s"$") {print $2}' | head -1)
          if [ -z "$path" ]; then
            echo "::error::submodule path not found for $REPO"
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Resolved: $REPO → $path"

      - uses: dagger/dagger-for-github@v8
        with:
          version: latest
          call: |
            deploy-cloudflare
            --source=${{ steps.resolve.outputs.path }}
            --cf-api-token=env:CLOUDFLARE_API_TOKEN
            --cf-account-id=env:CLOUDFLARE_ACCOUNT_ID
            --project-name=${{ github.event.client_payload.repo && github.event.client_payload.repo || github.event.inputs.repo }}
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
