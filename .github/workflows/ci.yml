name: CI

# Lightweight CI for the master oriz hub.
# Validates that every submodule's site builds cleanly on every PR.
# Per-site lint / typecheck / test are out of scope here; each site runs
# its own checks via this same matrix on demand.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - 'DEPLOY.md'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: Build ${{ matrix.site }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        site:
          - oriz-home
          - oriz-blog
          - oriz-book-lore
          - oriz-books
          - oriz-cards
          - oriz-finance
          - oriz-image-tools
          - oriz-journal
          - oriz-pdf-tools
          - oriz-urls-to-md
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sites/${{ matrix.site }}/pnpm-lock.yaml
      - name: Install
        working-directory: sites/${{ matrix.site }}
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        working-directory: sites/${{ matrix.site }}
        continue-on-error: true
        run: pnpm typecheck
      - name: Build
        working-directory: sites/${{ matrix.site }}
        env:
          UV_THREADPOOL_SIZE: '64'
        run: pnpm build
